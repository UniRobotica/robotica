title: Robótica
author: UniRobótica
copyright: '2024'
logo: UniRoboticaAzulSemFundo.png

# ── Parser ────────────────────────────────────────────────────────────────────
# ADICIONADO: MyST é necessário para {figure}, {note}, {numref} e equações $$
parse:
  myst_enable_extensions:
    - colon_fence   # diretivas {figure}, {note}, {admonition} etc.
    - dollarmath    # equações $...$ e $$...$$

# ── Execução ──────────────────────────────────────────────────────────────────
execute:
  execute_notebooks: 'off'

# ── LaTeX ─────────────────────────────────────────────────────────────────────
latex:
  latex_documents:
    targetname: book.tex

# ── Referências ───────────────────────────────────────────────────────────────
bibtex_bibfiles:
  - references.bib

# ── Repositório ───────────────────────────────────────────────────────────────
repository:
  url: https://github.com/UniRobotica/robotica
  path_to_book: .
  branch: main

# ── HTML ──────────────────────────────────────────────────────────────────────
html:
  favicon: 'favicon.png'
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  extra_javascript:
    - _static/logo_link.js

# ── Botões de execução interativa ─────────────────────────────────────────────
launch_buttons:
  thebe: true
  notebook_interface: "jupyterlab"

# REMOVIDO: 'content.notebooks' — estrutura do livro vai em _toc.yml, não aqui
# REMOVIDO: 'thebe_config' como chave raiz — era ignorada

# ── Sphinx ────────────────────────────────────────────────────────────────────
sphinx:
  extra_files:
    - CNAME
  config:
    html_extra_path:
      - assets
    nb_mime_priority_overrides:
      - ['html', 'text/html', 100]